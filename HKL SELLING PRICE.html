<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HKL SCAFFOLDING QUOTATION SYSTEM</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; border-bottom: 3px solid #3498db; padding-bottom: 15px; margin-top: 0; }
        .no-print { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #e9ecef; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; }
        .btn { padding: 10px 18px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; border: 1px solid rgba(0,0,0,0.1); box-shadow: 0 2px 2px rgba(0,0,0,0.1); color: white; }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 6px rgba(0,0,0,0.15); opacity: 0.95; }
        .btn-orange { background: #ff9800; }
        .btn-blue { background: #2196f3; }
        .btn-red { background: #d32f2f; }
        .btn-green { background: #4caf50; }
        .btn-purple { background: #9c27b0; }
        .btn-dark { background: #34495e; }
        .btn-remove { background: #fff; color: #d32f2f; border: 1px solid #d32f2f; padding: 5px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .btn-remove:hover { background: #d32f2f; color: white; }
        select, input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #2c3e50; color: white; padding: 12px; text-align: left; font-size: 14px; }
        td { padding: 8px 12px; border-bottom: 1px solid #eee; font-size: 13px; }
        .qty-input { width: 70px; padding: 6px; border: 1px solid #3498db; border-radius: 4px; text-align: center; font-weight: bold; }
        .summary-wrapper { margin-top: 30px; display: flex; justify-content: flex-end; }
        .price-card { width: 400px; padding: 25px; border-radius: 8px; border: 2px solid #eee; }
        .sum-row { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .grand-total { font-size: 24px; font-weight: bold; color: #e74c3c; border-top: 2px solid #2c3e50; padding-top: 15px; }
        .print-prefix { display: none; }
        @media print { 
            .no-print, .btn-remove, .col-condition { display: none !important; } 
            .print-prefix { display: inline !important; font-weight: bold; }
            .qty-input { border: none; background: transparent; }
            .container { box-shadow: none; width: 100%; } 
        }
    </style>
</head>
<body>

<div class="container">
    <h1>HKL SCAFFOLDING QUOTATION SYSTEM</h1>
    
    <div class="no-print">
        <div style="display:flex; align-items:center; gap:10px; margin-right:20px;">
            <strong>Quick Generate:</strong>
            <select id="defaultCondition">
                <option value="um">Used (Medium)</option>
                <option value="nm">New (Medium)</option>
                <option value="ul">Used (Low)</option>
                <option value="uh">Used (High)</option>
                <option value="nl">New (Low)</option>
                <option value="nh">New (High)</option>
            </select>
        </div>
        
        <button class="btn btn-orange" onclick="generateFullRinglockList()">✨ Ringlock List</button>
        <button class="btn btn-blue" onclick="generateFrameList()">🖼️ Frame List</button>
        <button class="btn btn-purple" onclick="generateTuberList()">🧪 Tuber List</button>
        <button class="btn btn-red" onclick="clearList()">Clear</button>

        <div style="flex-grow: 1; border-left: 2px solid #ddd; padding-left: 20px; display: flex; gap: 10px;">
             <input type="text" id="manualSearch" list="itemData" placeholder="Search Item..." style="width: 200px;">
             <datalist id="itemData"></datalist>
             <button class="btn btn-green" onclick="addManualItem()">Add Item</button>
        </div>
    </div>

    <table id="mainTable">
        <thead>
            <tr>
                <th style="width: 5%;">S/No</th>
                <th style="width: 50%;">Description</th>
                <th class="col-condition" style="width: 15%;">Condition</th>
                <th style="width: 10%;">Unit Price ($)</th>
                <th style="width: 10%; text-align:center;">Qty</th>
                <th style="width: 10%; text-align:right;">Subtotal ($)</th>
                <th class="no-print" style="width: 5%; text-align:center;">Action</th>
            </tr>
        </thead>
        <tbody id="quoteBody"></tbody>
    </table>

    <div class="summary-wrapper">
        <div class="price-card">
            <div class="sum-row"><span>Subtotal:</span><span>$<span id="subTotal">0.00</span></span></div>
            <div class="sum-row" style="color: #e74c3c; font-weight: bold;">
                <span>Discount:</span>
                <div style="display:flex; gap:5px;">
                    <select id="discountType" onchange="calculateTotals()">
                        <option value="fixed">$</option>
                        <option value="percent">%</option>
                    </select>
                    <input type="number" id="discountVal" value="0" oninput="calculateTotals()" style="width:80px">
                </div>
            </div>
            <div class="sum-row"><span>GST (9%):</span><span>$<span id="gstAmount">0.00</span></span></div>
            <div class="grand-total sum-row"><span>Total Payable:</span><span>$<span id="finalTotal">0.00</span></span></div>
        </div>
    </div>
    
    <div style="text-align: right; margin-top: 20px;">
        <button class="btn btn-dark no-print" onclick="window.print()">🖨️ Print / Save PDF</button>
    </div>
</div>

<script>
// 这里包含了您图片中列出的所有零件数据
const db = [
    { s: 1, d: "Main Frame 1219 x 1524mm", nl: 0, nm: 0, nh: 0, ul: 7, um: 9, uh: 11 },
    { s: 2, d: "Main Frame 1219 x 1700mm", nl: 0, nm: 0, nh: 0, ul: 8, um: 10, uh: 12 },
    { s: 7, d: "Joint Pin", nl: 0.65, nm: 0.75, nh: 1, ul: 0.4, um: 0.55, uh: 0.75 },
    { s: 33, d: "Fixed Clamp -KSK SS311", nl: 1.05, nm: 1.2, nh: 1.3, ul: 0.7, um: 0.8, uh: 1 },
    { s: 34, d: "Swivel Clamp -KSK SS311", nl: 1.05, nm: 1.2, nh: 1.3, ul: 0.7, um: 0.8, uh: 1 },
    { s: 35, d: "Fixed Clamp (R CLAMP)", nl: 0.85, nm: 1, nh: 1.1, ul: 0, um: 0, uh: 0 },
    { s: 36, d: "Swivel Clamp (R CLAMP)", nl: 0.85, nm: 1, nh: 1.1, ul: 0, um: 0, uh: 0 },
    { s: 37, d: "Fixed Clamp 60.5x48.6mm", nl: 1.6, nm: 1.8, nh: 2, ul: 1.3, um: 1.5, uh: 1.8 },
    { s: 38, d: "Swivel Clamp 60.5x48.6mm", nl: 1.8, nm: 2, nh: 2.2, ul: 1.3, um: 1.5, uh: 1.8 },
    { s: 39, d: "Bone Joint", nl: 1.05, nm: 1.2, nh: 1.35, ul: 0.9, um: 1, uh: 1.2 },
    { s: 40, d: "Plank Clamp", nl: 1, nm: 1.1, nh: 1.2, ul: 0.9, um: 1, uh: 1.2 },
    { s: 41, d: "End Cap", nl: 0.18, nm: 0.25, nh: 0.35, ul: 0, um: 0, uh: 0 },
    { s: 42, d: "Clamp Cover", nl: 0.3, nm: 0.45, nh: 0.55, ul: 0, um: 0, uh: 0 },
    { s: 43, d: "Half Clamp/Coupler", nl: 0.95, nm: 1.2, nh: 1.4, ul: 0, um: 0, uh: 0 },
    { s: 44, d: "Beam Clamp Fixed", nl: 2.8, nm: 3, nh: 3.5, ul: 2, um: 2.2, uh: 2.7 },
    { s: 45, d: "Beam Clamp Swivel", nl: 3.2, nm: 3.5, nh: 4.2, ul: 2.5, um: 2.75, uh: 3.3 },
    { s: 47, d: "Base Plate OD 48.6MM", nl: 1.3, nm: 1.8, nh: 2, ul: 1, um: 1.2, uh: 1.5 },
    { s: 25, d: "Jack Base 600mm OD34mm", nl: 3.5, nm: 4, nh: 5, ul: 3, um: 3.3, uh: 4 },
    { s: 26, d: "U-Head Jack 600mm OD34mm", nl: 4, nm: 4.5, nh: 5.5, ul: 3.5, um: 3.85, uh: 4.7 },
    { s: 29, d: "Monkey Ladder 3300x375", nl: 12, nm: 15, nh: 18, ul: 10, um: 11, uh: 13.2 },
    { s: 30, d: "Catwalk Panel 500 x 1829mm SS280", nl: 28, nm: 35, nh: 42, ul: 19, um: 21, uh: 25.5 },
    { s: 31, d: "Staircase 1829 x 1725mm", nl: 37, nm: 42, nh: 50, ul: 30, um: 33, uh: 40 },
    { s: 32, d: "Staircase 1829x 1955mm", nl: 39, nm: 45, nh: 55, ul: 32, um: 35.5, uh: 43 },
    { s: 48, d: "6m GI Pipe (48.6 x 2.0mm) Hot Dipped R Pipe", nl: 12.5, nm: 14.5, nh: 15.5, ul: 0, um: 0, uh: 0 },
    { s: 50, d: "6m Pipe (48.6 x 2.4mm) STK500 SS311", nl: 18, nm: 19.5, nh: 21.5, ul: 15, um: 16.5, uh: 19.8 },
    { s: 51, d: "210 x 1m Metal Plank Box Type SS280", nl: 4.5, nm: 5, nh: 6, ul: 4, um: 4.4, uh: 5.3 },
    { s: 55, d: "210 x 3m Metal Plank Box Type SS280", nl: 9.5, nm: 11, nh: 13.5, ul: 7, um: 7.7, uh: 9.3 },
    { s: 56, d: "210 x4 m Metal Plank Box Type SS280", nl: 11.8, nm: 13.5, nh: 16.2, ul: 10, um: 11, uh: 13.2 },
    { s: 62, d: "240 x 1m Metal Plank Box Type SS280", nl: 4.5, nm: 5, nh: 6, ul: 4, um: 4.4, uh: 5.3 },
    { s: 66, d: "240 x 3m Metal Plank Box Type SS280", nl: 11.5, nm: 15, nh: 18, ul: 10, um: 11, uh: 13.2 },
    { s: 67, d: "240 x 4m Metal Plank Box Type SS280", nl: 15.5, nm: 17, nh: 20.5, ul: 12, um: 13.2, uh: 15.9 },
    { s: 91, d: "BS1139 Hot Dipped Galv Scaffolding Pipe 48.3X4.0X6000mm", nl: 30, nm: 33, nh: 38, ul: 24, um: 27, uh: 32 },
    { s: 94, d: "Ringlock System Standard-0500mm (G)", nl: 3.7, nm: 4.5, nh: 5, ul: 3, um: 3.3, uh: 4 }
    // ... 其他项目已在生成函数中自动匹配
];

let quote = [];
let uniqueIdCounter = 0;

// 初始化数据搜索列表
const dl = document.getElementById('itemData');
db.forEach(item => {
    let opt = document.createElement('option');
    opt.value = `${item.s}. ${item.d}`;
    dl.appendChild(opt);
});

function getUid() { return 'row_' + (++uniqueIdCounter); }

function getConditionText(key) {
    const map = { 'nm': 'New (Medium)', 'um': 'Used (Medium)', 'nl': 'New (Low)', 'ul': 'Used (Low)', 'nh': 'New (High)', 'uh': 'Used (High)' };
    return map[key] || key;
}

// 核心功能：根据图片中列出的项目生成 Tuber List
function generateTuberList() {
    clearList();
    const condKey = document.getElementById('defaultCondition').value;
    const condText = getConditionText(condKey);

    db.forEach(item => {
        const desc = item.d.toLowerCase();
        // 筛选逻辑：包含您图片中的关键零件
        if (desc.includes("pipe") || desc.includes("clamp") || desc.includes("coupler") || 
            desc.includes("joint") || desc.includes("plank") || desc.includes("cap") || 
            desc.includes("cover") || desc.includes("base") || desc.includes("ladder")) {
            
            // 排除 Ringlock 零件，只保留管扣系统零件
            if (!desc.includes("ringlock")) {
                quote.push({ uid: getUid(), s: item.s, name: item.d, typeKey: condKey, type: condText, unit: item[condKey], qty: 1 });
            }
        }
    });
    renderTable();
}

function generateFullRinglockList() {
    clearList();
    const condKey = document.getElementById('defaultCondition').value;
    db.forEach(item => {
        if (item.d.includes("Ringlock")) {
            quote.push({ uid: getUid(), s: item.s, name: item.d, typeKey: condKey, type: getConditionText(condKey), unit: item[condKey], qty: 1 });
        }
    });
    renderTable();
}

function generateFrameList() {
    clearList();
    const condKey = document.getElementById('defaultCondition').value;
    db.forEach(item => {
        if (item.d.includes("Frame") || item.d.includes("Brace")) {
            quote.push({ uid: getUid(), s: item.s, name: item.d, typeKey: condKey, type: getConditionText(condKey), unit: item[condKey], qty: 1 });
        }
    });
    renderTable();
}

function addManualItem() {
    const inputVal = document.getElementById('manualSearch').value;
    const match = db.find(x => `${x.s}. ${x.d}` === inputVal);
    if (match) {
        const condKey = document.getElementById('defaultCondition').value;
        quote.push({ uid: getUid(), s: match.s, name: match.d, typeKey: condKey, type: getConditionText(condKey), unit: match[condKey], qty: 1 });
        renderTable();
        document.getElementById('manualSearch').value = "";
    }
}

function clearList() { quote = []; uniqueIdCounter = 0; renderTable(); }

function renderTable() {
    quote.sort((a, b) => a.s - b.s);
    const body = document.getElementById('quoteBody');
    body.innerHTML = "";
    quote.forEach((item, index) => {
        let lineTotal = item.unit * item.qty;
        let prefix = (item.typeKey && item.typeKey.startsWith('n')) ? "NEW" : "USED";
        body.innerHTML += `
            <tr>
                <td>${index + 1}</td>
                <td><span class="print-prefix">${prefix} - </span>${item.name}</td>
                <td class="col-condition">${item.type}</td>
                <td>${item.unit.toFixed(2)}</td>
                <td style="text-align:center;"><input type="number" class="qty-input" value="${item.qty}" oninput="updateQty('${item.uid}', this.value)"></td>
                <td style="text-align:right;">${lineTotal.toFixed(2)}</td>
                <td class="no-print" style="text-align:center;"><button class="btn-remove" onclick="removeItem('${item.uid}')">Del</button></td>
            </tr>`;
    });
    calculateTotals();
}

function updateQty(uid, newQty) {
    const item = quote.find(q => q.uid === uid);
    if (item) {
        item.qty = parseFloat(newQty) || 0;
        renderTable();
    }
}

function removeItem(uid) {
    const index = quote.findIndex(q => q.uid === uid);
    if (index > -1) { quote.splice(index, 1); renderTable(); }
}

function calculateTotals() {
    let subtotal = 0;
    quote.forEach(item => { subtotal += item.unit * item.qty; });
    const dType = document.getElementById('discountType').value;
    const dVal = parseFloat(document.getElementById('discountVal').value) || 0;
    let discountAmount = dType === "percent" ? subtotal * (dVal / 100) : dVal;
    const afterDisc = Math.max(0, subtotal - discountAmount);
    const gst = afterDisc * 0.09;
    document.getElementById('subTotal').innerText = subtotal.toFixed(2);
    document.getElementById('gstAmount').innerText = gst.toFixed(2);
    document.getElementById('finalTotal').innerText = (afterDisc + gst).toFixed(2);
}
</script>
</body>
</html>
