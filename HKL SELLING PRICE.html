<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HKL SCAFFOLDING QUOTATION SYSTEM</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 20px; color: #333; line-height: 1.6; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; border-bottom: 3px solid #3498db; padding-bottom: 15px; margin-top: 0; }
        
        /* Dashboard Area */
        .no-print-controls { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #e9ecef; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; }
        
        /* Buttons Style */
        .btn { padding: 10px 18px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; border: 1px solid rgba(0,0,0,0.1); color: white; }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 6px rgba(0,0,0,0.15); opacity: 0.9; }
        .btn-orange { background: #ff9800; }
        .btn-blue { background: #2196f3; }
        .btn-purple { background: #9c27b0; }
        .btn-red { background: #d32f2f; }
        .btn-green { background: #4caf50; }
        .btn-dark { background: #34495e; }

        .btn-remove { background: #fff; color: #d32f2f; border: 1px solid #d32f2f; padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; }
        .btn-remove:hover { background: #d32f2f; color: white; }

        select, input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }

        /* Table Style */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #2c3e50; color: white; padding: 12px; text-align: left; font-size: 13px; }
        td { padding: 10px 12px; border-bottom: 1px solid #eee; font-size: 13px; }
        tr:hover { background-color: #f1f7fe; }
        
        .qty-input { width: 60px; padding: 5px; border: 1px solid #3498db; border-radius: 4px; text-align: center; font-weight: bold; }
        
        /* Price Calculation Card */
        .summary-wrapper { margin-top: 30px; display: flex; justify-content: flex-end; }
        .price-card { width: 380px; background: #fff; padding: 20px; border-radius: 8px; border: 2px solid #eee; }
        .sum-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 15px; }
        .grand-total { font-size: 22px; font-weight: bold; color: #e74c3c; border-top: 2px solid #2c3e50; padding-top: 15px; margin-top: 10px; }
        
        /* Print Rules */
        .print-prefix { display: none; }
        @media print { 
            .no-print-controls, .btn-remove, .col-condition { display: none !important; } 
            .print-prefix { display: inline !important; font-weight: bold; margin-right: 5px; }
            .qty-input { border: none; background: transparent; appearance: none; }
            .container { box-shadow: none; width: 100%; padding: 0; } 
            body { background: white; padding: 0; }
            th { background: #444 !important; color: white !important; -webkit-print-color-adjust: exact; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>HKL SCAFFOLDING QUOTATION</h1>
    
    <div class="no-print-controls">
        <div style="display:flex; align-items:center; gap:10px;">
            <strong>Default Category:</strong>
            <select id="defaultCondition">
                <option value="um">Used (Medium)</option>
                <option value="nm">New (Medium)</option>
                <option value="ul">Used (Low)</option>
                <option value="uh">Used (High)</option>
                <option value="nl">New (Low)</option>
                <option value="nh">New (High)</option>
            </select>
        </div>
        
        <button class="btn btn-orange" onclick="generateList('ringlock')">✨ Ringlock List</button>
        <button class="btn btn-blue" onclick="generateList('frame')">🖼️ Frame List</button>
        <button class="btn btn-purple" onclick="generateList('tuber')">🧪 Tuber List</button>
        <button class="btn btn-red" onclick="clearList()">Clear All</button>

        <div style="flex-grow: 1; border-left: 2px solid #ddd; padding-left: 20px; display: flex; gap: 8px;">
             <input type="text" id="manualSearch" list="itemData" placeholder="Search 128 items..." style="width: 250px;">
             <datalist id="itemData"></datalist>
             <button class="btn btn-green" onclick="addManualItem()">Add Item</button>
        </div>
    </div>

    <table id="mainTable">
        <thead>
            <tr>
                <th style="width: 5%;">S/No</th>
                <th style="width: 45%;">Description</th>
                <th class="col-condition" style="width: 15%;">Condition</th>
                <th style="width: 12%;">Unit Price ($)</th>
                <th style="width: 10%; text-align:center;">Qty</th>
                <th style="width: 10%; text-align:right;">Subtotal ($)</th>
                <th class="no-print-controls" style="width: 3%; text-align:center;"></th>
            </tr>
        </thead>
        <tbody id="quoteBody"></tbody>
    </table>

    <div class="summary-wrapper">
        <div class="price-card">
            <div class="sum-row"><span>Subtotal:</span><span>$<span id="subTotal">0.00</span></span></div>
            <div class="sum-row" style="color: #e74c3c;">
                <span>Discount:</span>
                <div style="display:flex; gap:4px;">
                    <select id="discountType" onchange="calculateTotals()">
                        <option value="fixed">$</option>
                        <option value="percent">%</option>
                    </select>
                    <input type="number" id="discountVal" value="0" oninput="calculateTotals()" style="width:70px">
                </div>
            </div>
            <div class="sum-row"><span>GST (9%):</span><span>$<span id="gstAmount">0.00</span></span></div>
            <div class="grand-total sum-row"><span>Total Payable:</span><span>$<span id="finalTotal">0.00</span></span></div>
        </div>
    </div>
    
    <div style="text-align: right; margin-top: 20px;">
        <button class="btn btn-dark no-print-controls" onclick="window.print()" style="padding: 12px 30px;">🖨️ Print Quote / Save PDF</button>
    </div>
</div>

    { s: 127, d: "BS Rack Hot Dip-0770mm (GALV)", nl: 180, nm: 250, nh: 300, ul: 110, um: 130, uh: 200 },
    { s: 128, d: "BS Rack- Detachable (GALV)", nl: 180, nm: 250, nh: 300, ul: 110, um: 130, uh: 200 }
    // ... 此处已包含所有核心 128 项，如有缺失可继续按此格式添加
];

let quote = [];
let uniqueIdCounter = 0;

// 初始化 Datalist 搜索建议
const dl = document.getElementById('itemData');
db.forEach(item => {
    let opt = document.createElement('option');
    opt.value = `${item.s}. ${item.d}`;
    dl.appendChild(opt);
});

function getUid() { return 'row_' + (++uniqueIdCounter); }

function getConditionText(key) {
    const map = { 'nm': 'New (Medium)', 'um': 'Used (Medium)', 'nl': 'New (Low)', 'ul': 'Used (Low)', 'nh': 'New (High)', 'uh': 'Used (High)' };
    return map[key] || key;
}

// 统一生成逻辑
function generateList(type) {
    clearList();
    const condKey = document.getElementById('defaultCondition').value;
    const condText = getConditionText(condKey);

    db.forEach(item => {
        const desc = item.d.toLowerCase();
        let match = false;

        if (type === 'ringlock' && desc.includes('ringlock')) match = true;
        if (type === 'frame' && (desc.includes('frame') || desc.includes('brace') || (desc.includes('jack') && !desc.includes('ringlock')))) match = true;
        if (type === 'tuber') {
            // 精准匹配图片中的 Tuber System：Pipe, Clamp, Coupler, Joint, Plank 等，排除 Ringlock
            if ((desc.includes('pipe') || desc.includes('clamp') || desc.includes('coupler') || desc.includes('joint') || desc.includes('bs1139') || desc.includes('plank')) && !desc.includes('ringlock')) {
                match = true;
            }
        }

        if (match) {
            quote.push({ uid: getUid(), s: item.s, name: item.d, typeKey: condKey, type: condText, unit: item[condKey], qty: 1 });
        }
    });
    renderTable();
}

function addManualItem() {
    const inputVal = document.getElementById('manualSearch').value;
    const match = db.find(x => `${x.s}. ${x.d}` === inputVal);
    if (match) {
        const condKey = document.getElementById('defaultCondition').value;
        quote.push({ uid: getUid(), s: match.s, name: match.d, typeKey: condKey, type: getConditionText(condKey), unit: match[condKey], qty: 1 });
        renderTable();
        document.getElementById('manualSearch').value = "";
    }
}

function clearList() { quote = []; uniqueIdCounter = 0; renderTable(); }

function renderTable() {
    quote.sort((a, b) => a.s - b.s);
    const body = document.getElementById('quoteBody');
    body.innerHTML = "";
    quote.forEach((item, index) => {
        let lineTotal = item.unit * item.qty;
        let prefix = (item.typeKey && item.typeKey.startsWith('n')) ? "NEW" : "USED";
        body.innerHTML += `
            <tr>
                <td>${index + 1}</td>
                <td><span class="print-prefix">${prefix} - </span>${item.name}</td>
                <td class="col-condition">${item.type}</td>
                <td>${item.unit.toFixed(2)}</td>
                <td style="text-align:center;"><input type="number" class="qty-input" value="${item.qty}" oninput="updateQty('${item.uid}', this.value)"></td>
                <td style="text-align:right;">${lineTotal.toFixed(2)}</td>
                <td class="no-print-controls" style="text-align:center;"><button class="btn-remove" onclick="removeItem('${item.uid}')">×</button></td>
            </tr>`;
    });
    calculateTotals();
}

function updateQty(uid, newQty) {
    const item = quote.find(q => q.uid === uid);
    if (item) {
        item.qty = parseFloat(newQty) || 0;
        calculateTotals();
        // 实时更新单行总价
        document.querySelector(`#quoteBody tr td:nth-child(6)`).innerText = (item.unit * item.qty).toFixed(2);
        renderTable(); // 刷新以同步所有数据
    }
}

function removeItem(uid) {
    const index = quote.findIndex(q => q.uid === uid);
    if (index > -1) { quote.splice(index, 1); renderTable(); }
}

function calculateTotals() {
    let subtotal = 0;
    quote.forEach(item => { subtotal += item.unit * item.qty; });
    const dType = document.getElementById('discountType').value;
    const dVal = parseFloat(document.getElementById('discountVal').value) || 0;
    let disc = dType === "percent" ? subtotal * (dVal / 100) : dVal;
    const afterDisc = Math.max(0, subtotal - disc);
    const gst = afterDisc * 0.09;
    document.getElementById('subTotal').innerText = subtotal.toFixed(2);
    document.getElementById('gstAmount').innerText = gst.toFixed(2);
    document.getElementById('finalTotal').innerText = (afterDisc + gst).toFixed(2);
}
</script>
</body>
</html>
